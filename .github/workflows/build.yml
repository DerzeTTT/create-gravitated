name: Build

on:
  push:
    branches:
      - main
      - master
      - codex/**
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build addon jar
        run: ./gradlew :aeronautics-addon:neoforge:build

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: create-gravitated-neoforge
          path: aeronautics-addon/neoforge/build/libs/create-gravitated-neoforge-*.jar
